name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DIRECTUS_URL: ${{ secrets.NEXT_PUBLIC_DIRECTUS_URL }}

      - name: Prepare standalone structure
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Create .env.production
        run: |
          cat > .env.production << 'EOF'
          NEXT_PUBLIC_DIRECTUS_URL=${{ secrets.NEXT_PUBLIC_DIRECTUS_URL }}
          DIRECTUS_URL=${{ secrets.DIRECTUS_URL }}
          DIRECTUS_ADMIN_TOKEN=${{ secrets.DIRECTUS_ADMIN_TOKEN }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          EOF

      - name: Create restart trigger
        run: mkdir -p tmp && touch tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          protocol: ftp
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            !**/.next/standalone/node_modules/**
            **/.env.local
            **/.env.example
            **/src/**
            **/.github/**
